<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON BREAKOUT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  #game-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 800px;
    padding: 6px 12px;
    border: 1px solid rgba(0,255,255,0.3);
    background: rgba(0,255,255,0.03);
    border-radius: 4px;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-size: 10px;
    color: rgba(0,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .hud-value {
    font-size: 22px;
    font-weight: bold;
    color: #0ff;
    text-shadow:
      0 0 6px #0ff,
      0 0 14px #0ff,
      0 0 28px rgba(0,255,255,0.5);
    letter-spacing: 2px;
  }

  .hud-lives {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .life-icon {
    width: 12px;
    height: 12px;
    background: #f0f;
    border-radius: 50%;
    box-shadow: 0 0 6px #f0f, 0 0 12px #f0f;
    transition: all 0.3s;
  }

  .life-icon.lost {
    background: rgba(255,0,255,0.15);
    box-shadow: none;
  }

  canvas {
    display: block;
    border: 2px solid rgba(0,255,255,0.4);
    box-shadow:
      0 0 10px rgba(0,255,255,0.3),
      0 0 30px rgba(0,255,255,0.15),
      0 0 60px rgba(0,255,255,0.05),
      inset 0 0 40px rgba(0,0,0,0.8);
    background: #000;
    cursor: none;
  }

  #message-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }

  #msg-title {
    font-size: 52px;
    font-weight: bold;
    letter-spacing: 8px;
    color: #0ff;
    text-shadow:
      0 0 10px #0ff,
      0 0 25px #0ff,
      0 0 50px rgba(0,255,255,0.7),
      0 0 100px rgba(0,255,255,0.3);
    animation: flicker 3s infinite;
  }

  #msg-sub {
    margin-top: 14px;
    font-size: 16px;
    color: rgba(255,255,0,0.85);
    letter-spacing: 4px;
    text-shadow: 0 0 8px #ff0, 0 0 16px rgba(255,255,0,0.5);
    animation: pulse 1s ease-in-out infinite;
  }

  #msg-score {
    margin-top: 20px;
    font-size: 20px;
    color: #f0f;
    letter-spacing: 3px;
    text-shadow: 0 0 8px #f0f, 0 0 16px rgba(255,0,255,0.5);
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.6; }
    97% { opacity: 1; }
    98% { opacity: 0.4; }
    99% { opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.97); }
  }

  #footer {
    width: 800px;
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 6px;
  }

  .key-hint {
    font-size: 11px;
    color: rgba(0,255,255,0.35);
    letter-spacing: 2px;
  }

  .key-hint span {
    color: rgba(255,255,0,0.6);
    border: 1px solid rgba(255,255,0,0.4);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    margin-right: 4px;
  }
</style>
</head>
<body>
<div id="game-container">
  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="score-display">000000</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">LEVEL</div>
      <div class="hud-value" id="level-display">01</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">LIVES</div>
      <div class="hud-lives" id="lives-display"></div>
    </div>
    <div class="hud-item">
      <div class="hud-label">HI-SCORE</div>
      <div class="hud-value" id="hi-score-display">000000</div>
    </div>
  </div>

  <canvas id="canvas" width="800" height="540"></canvas>

  <div id="message-overlay">
    <div id="msg-title">NEON BREAKOUT</div>
    <div id="msg-score"></div>
    <div id="msg-sub">PRESS SPACE OR CLICK TO START</div>
  </div>

  <div id="footer">
    <div class="key-hint"><span>←→</span> MOVE</div>
    <div class="key-hint"><span>MOUSE</span> MOVE</div>
    <div class="key-hint"><span>SPACE</span> LAUNCH</div>
    <div class="key-hint"><span>P</span> PAUSE</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

// ── Game constants ──────────────────────────────────────
const PADDLE_H = 12;
const PADDLE_Y = H - 50;
const BALL_R = 7;
const BRICK_COLS = 12;
const BRICK_ROWS = 7;
const BRICK_W = Math.floor((W - 60) / BRICK_COLS);
const BRICK_H = 22;
const BRICK_PAD = 4;
const BRICK_TOP = 60;
const MAX_LIVES = 3;

const NEON_COLORS = [
  { fill: '#ff0066', glow: '#ff0066' },
  { fill: '#ff6600', glow: '#ff6600' },
  { fill: '#ffff00', glow: '#ffff00' },
  { fill: '#00ff66', glow: '#00ff66' },
  { fill: '#00ccff', glow: '#00ccff' },
  { fill: '#aa00ff', glow: '#aa00ff' },
  { fill: '#ff00cc', glow: '#ff00cc' },
];

// ── State ───────────────────────────────────────────────
let state = 'title'; // title | playing | paused | levelup | dead | gameover
let score = 0;
let hiScore = parseInt(localStorage.getItem('neonBreakoutHi') || '0');
let lives = MAX_LIVES;
let level = 1;

let paddle = { x: W / 2, w: 110 };
let ball = { x: 0, y: 0, vx: 0, vy: 0 };
let bricks = [];
let particles = [];
let shakeFrames = 0;

let mouseX = W / 2;
let keys = {};
let animId;

// ── HUD helpers ─────────────────────────────────────────
function pad6(n) { return String(n).padStart(6, '0'); }
function pad2(n) { return String(n).padStart(2, '0'); }

function updateHUD() {
  document.getElementById('score-display').textContent = pad6(score);
  document.getElementById('level-display').textContent = pad2(level);
  document.getElementById('hi-score-display').textContent = pad6(hiScore);
  const livesEl = document.getElementById('lives-display');
  livesEl.innerHTML = '';
  for (let i = 0; i < MAX_LIVES; i++) {
    const d = document.createElement('div');
    d.className = 'life-icon' + (i >= lives ? ' lost' : '');
    livesEl.appendChild(d);
  }
}

function showMessage(title, sub, extra) {
  const ov = document.getElementById('message-overlay');
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-sub').textContent = sub;
  document.getElementById('msg-score').textContent = extra || '';
  ov.style.display = 'block';
}

function hideMessage() {
  document.getElementById('message-overlay').style.display = 'none';
}

// ── Init ────────────────────────────────────────────────
function initBall() {
  ball.x = paddle.x;
  ball.y = PADDLE_Y - BALL_R - 2;
  const speed = 4.5 + (level - 1) * 0.35;
  const angle = (-Math.PI / 2) + (Math.random() - 0.5) * (Math.PI / 4);
  ball.vx = Math.cos(angle) * speed;
  ball.vy = Math.sin(angle) * speed;
  ball._onPaddle = true;
}

function initPaddle() {
  paddle.x = W / 2;
  paddle.w = Math.max(60, 110 - (level - 1) * 7);
}

function buildBricks() {
  bricks = [];
  const leftOff = (W - BRICK_COLS * BRICK_W - (BRICK_COLS - 1) * BRICK_PAD) / 2 + 2;
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      // Some bricks need 2 hits at higher levels
      const tough = level >= 3 && Math.random() < 0.25;
      const indestructible = level >= 5 && Math.random() < 0.08;
      bricks.push({
        x: leftOff + c * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W,
        h: BRICK_H,
        color: NEON_COLORS[r % NEON_COLORS.length],
        hp: indestructible ? 99 : (tough ? 2 : 1),
        maxHp: indestructible ? 99 : (tough ? 2 : 1),
        indestructible,
        alive: true,
        flashFrames: 0,
        scoreVal: indestructible ? 0 : (tough ? 30 : 10) * r + 10,
      });
    }
  }
}

function startLevel() {
  initPaddle();
  buildBricks();
  initBall();
  particles = [];
  state = 'playing';
  hideMessage();
  updateHUD();
}

function startGame() {
  score = 0;
  lives = MAX_LIVES;
  level = 1;
  startLevel();
}

// ── Particles ────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.025 + Math.random() * 0.04,
      r: 2 + Math.random() * 3,
      color,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ── Physics ──────────────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

function ballBrickCollision() {
  for (const b of bricks) {
    if (!b.alive) continue;

    const nx = clamp(ball.x, b.x, b.x + b.w);
    const ny = clamp(ball.y, b.y, b.y + b.h);
    const dx = ball.x - nx;
    const dy = ball.y - ny;
    if (dx * dx + dy * dy > BALL_R * BALL_R) continue;

    // Hit!
    b.flashFrames = 8;
    if (!b.indestructible) {
      b.hp--;
      if (b.hp <= 0) {
        b.alive = false;
        const pts = b.scoreVal * level;
        score += pts;
        if (score > hiScore) { hiScore = score; localStorage.setItem('neonBreakoutHi', hiScore); }
        spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color.fill, 14);
        shakeFrames = 4;
      } else {
        spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color.fill, 5);
        shakeFrames = 2;
      }
    } else {
      spawnParticles(b.x + b.w / 2, b.y + b.h / 2, '#ffffff', 4);
    }

    // Reflect
    const overlapX = (ball.vx > 0 ? (b.x - (ball.x + BALL_R)) : ((ball.x - BALL_R) - (b.x + b.w)));
    const overlapY = (ball.vy > 0 ? (b.y - (ball.y + BALL_R)) : ((ball.y - BALL_R) - (b.y + b.h)));
    if (Math.abs(overlapX) < Math.abs(overlapY)) {
      ball.vx = -ball.vx;
    } else {
      ball.vy = -ball.vy;
    }
    return; // one collision per frame
  }
}

function update() {
  if (state !== 'playing') return;

  // Paddle move
  const speed = 8;
  if (keys['ArrowLeft'] || keys['a']) paddle.x -= speed;
  if (keys['ArrowRight'] || keys['d']) paddle.x += speed;

  // Mouse control (smooth follow)
  paddle.x += (mouseX - paddle.x) * 0.25;
  paddle.x = clamp(paddle.x, paddle.w / 2, W - paddle.w / 2);

  // Ball on paddle
  if (ball._onPaddle) {
    ball.x = paddle.x;
    ball.y = PADDLE_Y - BALL_R - 2;
    return;
  }

  // Move ball
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall collisions
  if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
  if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

  // Paddle collision
  const px = paddle.x - paddle.w / 2;
  const py = PADDLE_Y - PADDLE_H / 2;
  if (ball.vy > 0 &&
      ball.y + BALL_R >= py &&
      ball.y + BALL_R <= py + PADDLE_H + 6 &&
      ball.x >= px - 4 &&
      ball.x <= px + paddle.w + 4) {
    ball.vy = -Math.abs(ball.vy);
    // Angle based on hit position
    const rel = (ball.x - paddle.x) / (paddle.w / 2);
    ball.vx = rel * 5.5;
    // Keep speed constant
    const spd = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    const targetSpd = 4.5 + (level - 1) * 0.35;
    ball.vx = (ball.vx / spd) * targetSpd;
    ball.vy = (ball.vy / spd) * targetSpd;
    spawnParticles(ball.x, ball.y, '#00ffff', 6);
  }

  // Brick collision
  ballBrickCollision();

  // Fall off bottom
  if (ball.y - BALL_R > H) {
    lives--;
    updateHUD();
    if (lives <= 0) {
      state = 'gameover';
      showMessage('GAME OVER', 'PRESS SPACE OR CLICK TO RETRY', 'SCORE: ' + pad6(score));
    } else {
      initBall();
    }
  }

  // Check level clear
  if (bricks.filter(b => b.alive && !b.indestructible).length === 0) {
    level++;
    state = 'levelup';
    showMessage('LEVEL ' + pad2(level), 'PRESS SPACE OR CLICK TO CONTINUE', 'SCORE: ' + pad6(score));
    updateHUD();
  }

  updateParticles();
  if (shakeFrames > 0) shakeFrames--;
}

// ── Draw helpers ─────────────────────────────────────────
function glowRect(x, y, w, h, color, glowSize) {
  ctx.shadowColor = color;
  ctx.shadowBlur = glowSize;
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
  ctx.shadowBlur = 0;
}

function drawBackground() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(0,255,255,0.04)';
  ctx.lineWidth = 1;
  const gStep = 40;
  for (let x = 0; x <= W; x += gStep) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += gStep) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawPaddle() {
  const x = paddle.x - paddle.w / 2;
  const y = PADDLE_Y - PADDLE_H / 2;
  const r = PADDLE_H / 2;

  // Glow layers
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 20;
  ctx.fillStyle = 'rgba(0,255,255,0.15)';
  ctx.beginPath();
  ctx.roundRect(x - 4, y - 4, paddle.w + 8, PADDLE_H + 8, r + 2);
  ctx.fill();

  ctx.shadowBlur = 12;
  ctx.fillStyle = '#00ffff';
  ctx.beginPath();
  ctx.roundRect(x, y, paddle.w, PADDLE_H, r);
  ctx.fill();

  // Bright center line
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.roundRect(x + 8, y + 3, paddle.w - 16, 4, 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBall() {
  // Trail glow
  ctx.shadowColor = '#ffff00';
  ctx.shadowBlur = 24;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R + 4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,0,0.12)';
  ctx.fill();

  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#ffff00';
  ctx.fill();

  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(ball.x - 2, ball.y - 2, BALL_R * 0.4, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBricks() {
  for (const b of bricks) {
    if (!b.alive) continue;
    const flashing = b.flashFrames > 0;
    if (flashing) { b.flashFrames--; }

    const alpha = b.indestructible ? 0.4 : (b.hp / b.maxHp);
    const col = b.color;

    ctx.shadowColor = col.glow;
    ctx.shadowBlur = flashing ? 24 : 10;

    // Outer glow
    ctx.fillStyle = `rgba(${hexRgb(col.fill).join(',')},0.15)`;
    ctx.fillRect(b.x - 2, b.y - 2, b.w + 4, b.h + 4);

    // Main brick
    ctx.fillStyle = b.indestructible
      ? 'rgba(150,150,150,0.5)'
      : `rgba(${hexRgb(col.fill).join(',')},${0.45 + alpha * 0.4})`;
    ctx.fillRect(b.x, b.y, b.w, b.h);

    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, 3);

    // Hard brick indicator
    if (b.hp === 2 && b.maxHp === 2) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.strokeRect(b.x + 3, b.y + 3, b.w - 6, b.h - 6);
    }
    if (b.indestructible) {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = 'bold 11px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('■', b.x + b.w / 2, b.y + b.h / 2);
    }

    ctx.shadowBlur = 0;
  }
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawCursor() {
  // Custom crosshair at mouse position
  ctx.strokeStyle = 'rgba(0,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 6;
  const s = 8;
  ctx.beginPath();
  ctx.moveTo(mouseX - s, PADDLE_Y);
  ctx.lineTo(mouseX + s, PADDLE_Y);
  ctx.moveTo(mouseX, PADDLE_Y - s);
  ctx.lineTo(mouseX, PADDLE_Y + s);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ── Render ───────────────────────────────────────────────
function draw() {
  // Camera shake
  ctx.save();
  if (shakeFrames > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeFrames * 2,
      (Math.random() - 0.5) * shakeFrames * 2
    );
  }

  drawBackground();
  drawBricks();
  drawParticles();
  drawPaddle();
  if (state !== 'title' && state !== 'gameover') drawBall();
  drawCursor();

  ctx.restore();
}

// ── Hex to RGB ───────────────────────────────────────────
function hexRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

// ── Game loop ────────────────────────────────────────────
function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ── Input ────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
});

canvas.addEventListener('click', () => action());
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); action(); }
  if (e.key === 'p' || e.key === 'P') togglePause();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function action() {
  if (state === 'title') { startGame(); return; }
  if (state === 'gameover') { startGame(); return; }
  if (state === 'levelup') { startLevel(); return; }
  if (state === 'playing' && ball._onPaddle) {
    ball._onPaddle = false;
    return;
  }
  if (state === 'paused') { togglePause(); return; }
}

function togglePause() {
  if (state === 'playing') {
    state = 'paused';
    showMessage('PAUSED', 'PRESS P OR SPACE TO RESUME', '');
  } else if (state === 'paused') {
    state = 'playing';
    hideMessage();
  }
}

// ── Boot ─────────────────────────────────────────────────
updateHUD();
showMessage('NEON BREAKOUT', 'PRESS SPACE OR CLICK TO START', '');
loop();
</script>
</body>
</html>
